spring.application.name=backend

# Database Connection
spring.datasource.url=jdbc:postgresql://localhost:5432/kpi_db
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Specifying the active profile
spring.profiles.active=dev

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Server
server.port=8080

# File Upload Configuration
# Directory where uploaded files will be stored (relative to app working directory)
app.upload.dir=./uploads
# Maximum file size in MB
app.upload.max-size=10

# Spring multipart configuration (for file uploads)
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB