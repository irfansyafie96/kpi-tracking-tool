<div class="d-flex justify-content-center align-items-center vh-100 bg-light">
  <div class="card shadow-lg p-5 text-center border-0" style="max-width: 500px;">
    <h1 class="display-5 fw-bold mb-3 text-dark">BA/QA KPI Tracking System</h1>
    <p class="lead mb-4 text-muted">Performance Evaluation Tool</p>
    
    <div class="d-grid gap-3">
      <button 
        class="btn btn-primary btn-lg py-3 fw-bold"
        (click)="selectRole('PM')">
        Enter as Project Manager
      </button>
      
      <button 
        class="btn btn-success btn-lg py-3 fw-bold"
        (click)="selectRole('PD')">
        Enter as Project Director
      </button>
    </div>
  </div>
</div>
