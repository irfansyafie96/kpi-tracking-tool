<div class="landing-container d-flex justify-content-center align-items-center bg-light">
  <div class="card p-3 p-md-5 text-center mx-auto w-100" style="max-width: 500px; border: 2px solid black;">
    <h1 class="display-6 display-md-5 fw-bold mb-3 text-dark">BA/QA KPI Tracking System</h1>
    <p class="lead mb-4 text-muted">Performance Evaluation Tool</p>

    <div class="d-grid gap-3">
      <button
        class="btn btn-primary btn-lg py-3 fw-bold"
        (click)="selectRole('PM')">
        Enter as Project Manager
      </button>

      <button
        class="btn btn-success btn-lg py-3 fw-bold"
        (click)="selectRole('PD')">
        Enter as Project Director
      </button>
    </div>
  </div>
</div>
