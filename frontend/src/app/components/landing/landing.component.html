<div class="d-flex justify-content-center align-items-center vh-100 bg-gradient">
  <div class="card shadow-lg p-5 text-center border-0" style="max-width: 500px;">
    <h1 class="display-5 fw-bold mb-3" style="color: var(--color-pitch-black);">BA/QA KPI Tracking System</h1>
    <p class="lead mb-4" style="color: var(--color-silver-alt);">Performance Evaluation Tool</p>
    
    <div class="d-grid gap-3">
      <button 
        class="btn btn-lg py-3 fw-bold" 
        style="background-color: var(--color-dusty-lavender); border-color: var(--color-dusty-lavender); color: white;"
        (click)="selectRole('PM')">
        Enter as Project Manager
      </button>
      
      <button 
        class="btn btn-lg py-3 fw-bold" 
        style="background-color: var(--color-stormy-teal); border-color: var(--color-stormy-teal); color: white;"
        (click)="selectRole('PD')">
        Enter as Project Director
      </button>
    </div>
  </div>
</div>
