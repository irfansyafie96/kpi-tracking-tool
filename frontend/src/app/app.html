<!-- Landing Page -->
<app-landing 
  *ngIf="!currentRole" 
  (roleSelected)="onRoleSelected($event)">
</app-landing>

<!-- Project Manager View -->
<app-pm-evaluation 
  *ngIf="currentRole === 'PM'"
  (goBack)="goBack()">
</app-pm-evaluation>

<!-- Project Director View -->
<app-dashboard 
  *ngIf="currentRole === 'PD'"
  (goBack)="goBack()">
</app-dashboard>
