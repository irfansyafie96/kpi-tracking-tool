<!-- Landing Page -->
<app-landing 
  *ngIf="!currentRole" 
  (roleSelected)="onRoleSelected($event)">
</app-landing>

<!-- Project Manager View -->
<app-pm-evaluation 
  *ngIf="currentRole === 'PM'"
  (goBack)="goBack()">
</app-pm-evaluation>

<!-- Project Director View (Placeholder) -->
<div *ngIf="currentRole === 'PD'" class="container mt-5">
  <div class="alert alert-success">
    <h2>Project Director Dashboard</h2>
    <p>Dashboard coming soon...</p>
    <button class="btn btn-secondary" (click)="goBack()">Back to Home</button>
  </div>
</div>
